services:
  loan-app:
    build:
      context: ./PracticumProject
      dockerfile: Dockerfile
    ports:
      - "5000:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - ConnectionStrings__DefaultConnection=Host=loan-db;Database=loan_db;Username=postgres;Password=p@ssword123
    depends_on:
      - loan-db

  loan-db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: loan_db
      POSTGRES_PASSWORD: p@ssword123
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
